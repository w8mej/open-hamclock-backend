# Security headers — hardening for all HTTP responses
# Loaded via lighttpd-enable-mod security-headers

# Hide Lighttpd version string
server.tag = "Web Server"

# Limit URI length to prevent DoS (default is 8190)
server.max-request-field-size = 8190

# Global security response headers
$HTTP["url"] =~ "" {
    setenv.add-response-header += (
        "X-Frame-Options" => "DENY",
        "X-Content-Type-Options" => "nosniff",
        "Content-Security-Policy" => "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'",
        "Referrer-Policy" => "strict-origin-when-cross-origin",
        "Strict-Transport-Security" => "max-age=31536000; includeSubDomains",
        "Permissions-Policy" => "geolocation=(), camera=(), microphone=(), payment=()"
    )
}

# CGI scripts should not be cached
$HTTP["url"] =~ "\.pl$" {
    setenv.add-response-header += (
        "Cache-Control" => "no-store, no-cache, must-revalidate"
    )
}
